<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>লুডু মাস্টার</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="../../index.html" class="back-btn">⬅ প্লাটফর্মে ফেরত যান</a>
            <h1>লুডু মাস্টার 🎲</h1>
        </header>

        <div class="game-area">
            <!-- Top Left -->
            <div class="player-panel green-panel" id="panel-green">
                <div class="dice-container-3d" id="dice-wrap-green">
                    <div class="dice-3d" id="dice-green">
                        <div class="dice-face face-1"><div class="dot"></div></div>
                        <div class="dice-face face-2"><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>
            </div>
            
            <!-- Top Right -->
            <div class="player-panel yellow-panel" id="panel-yellow">
                <div class="dice-container-3d" id="dice-wrap-yellow">
                    <div class="dice-3d" id="dice-yellow">
                        <div class="dice-face face-1"><div class="dot"></div></div>
                        <div class="dice-face face-2"><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>
            </div>

            <!-- Board -->
            <div class="board-container">
                <div class="ludo-board" id="ludo-board">
                    <!-- Tokens will be injected here -->
                </div>
            </div>

            <!-- Bottom Left -->
            <div class="player-panel red-panel" id="panel-red">
                <div class="dice-container-3d" id="dice-wrap-red">
                    <div class="dice-3d" id="dice-red">
                        <div class="dice-face face-1"><div class="dot"></div></div>
                        <div class="dice-face face-2"><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>
            </div>

            <!-- Bottom Right -->
            <div class="player-panel blue-panel" id="panel-blue">
                <div class="dice-container-3d" id="dice-wrap-blue">
                    <div class="dice-3d" id="dice-blue">
                        <div class="dice-face face-1"><div class="dot"></div></div>
                        <div class="dice-face face-2"><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                        <div class="dice-face face-6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="ludo.js"></script>
</body>
</html>
